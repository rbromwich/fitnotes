<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fit Session Distributor — AYBL</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFFFFF;
      --surface: #FFFFFF;
      --surface-2: #F0EEE9;
      --border: #E2DED6;
      --border-strong: #C8C3B8;
      --text: #1A1916;
      --text-muted: #7A7670;
      --text-faint: #ABA89F;
      --accent: #1A1916;
      --accent-text: #F7F6F3;
      --green-bg: #EAF3DE;
      --green-text: #3B6D11;
      --amber-bg: #FAEEDA;
      --amber-text: #854F0B;
      --lilac: #C4B5F4;
      --lilac-dark: #7C5CBF;
      --red-bg: #FCEBEB;
      --red-text: #A32D2D;
      --radius: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2.5rem 1.5rem 4rem;
    }

    .container {
      width: 100%;
      max-width: 620px;
    }

    .header {
      margin-bottom: 2rem;
    }

    .wordmark {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--text-faint);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 22px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.3;
    }

    h1 span {
      font-weight: 500;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.5;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.75rem 0;
    }

    .field { margin-bottom: 1.25rem; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-family: 'DM Mono', monospace;
    }

    input[type="text"] {
      width: 100%;
      height: 42px;
      padding: 0 14px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: var(--border-strong); }
    input[type="text"]::placeholder { color: var(--text-faint); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 40px;
      padding: 0 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--accent-text);
      border-color: var(--accent);
    }

    .btn-primary:hover { opacity: 0.82; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-lilac {
      background: var(--lilac);
      color: var(--lilac-dark);
      border-color: var(--lilac);
    }

    .btn-lilac:hover { opacity: 0.82; }
    .btn-lilac:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border-color: var(--border);
    }

    .btn-ghost:hover { background: var(--surface-2); color: var(--text); }

    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

    .spinner {
      width: 14px;
      height: 14px;
      border: 1.5px solid rgba(247,246,243,0.3);
      border-top-color: var(--accent-text);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      flex-shrink: 0;
    }

    .spinner-dark {
      border-color: rgba(26,25,22,0.15);
      border-top-color: var(--text);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 12px;
    }

    .garment-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      margin-bottom: 10px;
      animation: fadeUp 0.25s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .garment-card:nth-child(2) { animation-delay: 0.05s; }
    .garment-card:nth-child(3) { animation-delay: 0.1s; }
    .garment-card:nth-child(4) { animation-delay: 0.15s; }
    .garment-card:nth-child(5) { animation-delay: 0.2s; }

    .garment-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .style-code {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      background: var(--surface-2);
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .badge {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 6px;
      letter-spacing: 0.04em;
    }

    .badge-ready { background: var(--surface-2); color: var(--text-faint); border: 1px solid var(--border); }
    .badge-pushing { background: var(--amber-bg); color: var(--amber-text); border: 1px solid transparent; }
    .badge-done { background: var(--green-bg); color: var(--green-text); border: 1px solid transparent; }
    .badge-error { background: var(--red-bg); color: var(--red-text); border: 1px solid transparent; }

    .notes-preview {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.65;
      background: var(--surface-2);
      border-radius: var(--radius);
      padding: 10px 12px;
      white-space: pre-wrap;
      font-family: 'DM Sans', sans-serif;
    }

    .log-row {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      line-height: 2;
      color: var(--text-muted);
    }

    .log-ok { color: var(--green-text); }
    .log-err { color: var(--red-text); }

    .empty {
      font-size: 14px;
      color: var(--text-faint);
      padding: 0.5rem 0 1rem;
      line-height: 1.6;
    }

    .hidden { display: none; }

    .status-bar {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="wordmark">AYBL — Fit Notes Distributor</div>
    <h1>AYBL — <span>Fit Notes Distributor</span></h1>
    <p class="subtitle">Paste your fit session summary URL and database location below. Claude will identify each style code, extract the relevant notes, and append them to each garment's page in Notion.</p>
  </div>

  <div class="field">
    <label>Fit Notes Summary Page URL</label>
    <input type="text" id="pageUrl" placeholder="https://notion.so/..." />
  </div>

  <div class="field">
    <label>Fit Notes Database Location URL</label>
    <input type="text" id="dbUrl" placeholder="https://notion.so/..." />
  </div>

  <div class="btn-row">
    <button class="btn btn-lilac" id="parseBtn" onclick="parseSummary()">Extract fit notes</button>
  </div>

  <div id="parseStatus" class="status-bar hidden"></div>

  <div id="previewSection" class="hidden">
    <hr class="divider" />
    <p class="section-label" id="garmentCount"></p>
    <div id="garmentList"></div>
    <div class="btn-row" style="margin-top: 1.25rem;">
      <button class="btn btn-primary" id="pushBtn" onclick="pushToNotion()">Push all to Notion</button>
      <button class="btn btn-ghost" onclick="reset()">Start over</button>
    </div>
  </div>

  <div id="logSection" class="hidden">
    <hr class="divider" />
    <p class="section-label">Results</p>
    <div id="logList"></div>
  </div>

</div>

<script>
  let parsedGarments = [];
  let notionPageContent = '';

  function setParseStatus(html) {
    const el = document.getElementById('parseStatus');
    if (html) { el.innerHTML = html; el.classList.remove('hidden'); }
    else { el.classList.add('hidden'); }
  }

  async function fetchNotionPage(url) {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        mcp_servers: [{ type: "url", url: "https://mcp.notion.com/mcp", name: "notion-mcp" }],
        messages: [{ role: "user", content: `Fetch the full text content of this Notion page: ${url}. Return ONLY the raw text content of the page, nothing else.` }]
      })
    });
    const data = await res.json();
    return data.content.map(b => b.type === 'text' ? b.text : (b.type === 'mcp_tool_result' ? (b.content?.[0]?.text || '') : '')).join('\n');
  }

  async function parseSummary() {
    const url = document.getElementById('pageUrl').value.trim();
    const dbUrl = document.getElementById('dbUrl').value.trim();
    if (!url) { alert('Please enter the Fit Notes Summary Page URL.'); return; }
    if (!dbUrl) { alert('Please enter the Fit Notes Database Location URL.'); return; }

    const parseBtn = document.getElementById('parseBtn');
    parseBtn.disabled = true;
    parseBtn.innerHTML = '<span class="spinner"></span>Reading page...';
    setParseStatus('');

    try {
      setParseStatus('<span class="spinner spinner-dark"></span> Connecting to Notion...');
      notionPageContent = await fetchNotionPage(url);

      setParseStatus('<span class="spinner spinner-dark"></span> Identifying style codes...');

      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: `You are a fashion product development assistant for AYBL. Read these fit session notes and extract the fit comments for each garment style code (format: AYBL followed by 4 digits, e.g. AYBL1315).

Return ONLY valid JSON, no preamble, no markdown backticks:
{"garments":[{"styleCode":"AYBL1315","notes":"Full fit notes for this style..."},{"styleCode":"AYBL1316","notes":"Full fit notes for this style..."}]}

Fit session content:
${notionPageContent}`
          }]
        })
      });

      const data = await res.json();
      const raw = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
      const clean = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      parsedGarments = parsed.garments || [];

      setParseStatus('');
      renderPreview();
    } catch(e) {
      setParseStatus(`<span style="color:var(--red-text)">Error: ${e.message}</span>`);
      parseBtn.disabled = false;
      parseBtn.textContent = 'Extract fit notes';
    }
  }

  function renderPreview() {
    const parseBtn = document.getElementById('parseBtn');
    parseBtn.disabled = false;
    parseBtn.textContent = 'Extract fit notes';

    const section = document.getElementById('previewSection');
    const list = document.getElementById('garmentList');
    const count = document.getElementById('garmentCount');
    section.classList.remove('hidden');

    if (parsedGarments.length === 0) {
      count.textContent = 'No garments found';
      list.innerHTML = '<p class="empty">No style codes were identified. Make sure style codes appear in the transcript in AYBL+4 digit format (e.g. AYBL1315).</p>';
      return;
    }

    count.textContent = `${parsedGarments.length} garment${parsedGarments.length !== 1 ? 's' : ''} identified`;

    list.innerHTML = parsedGarments.map((g, i) => `
      <div class="garment-card" style="animation-delay:${i * 0.05}s">
        <div class="garment-header">
          <span class="style-code">${g.styleCode}</span>
          <span class="badge badge-ready" id="badge-${i}">Ready</span>
        </div>
        <div class="notes-preview">${g.notes}</div>
      </div>
    `).join('');
  }

  async function pushToNotion() {
    const pushBtn = document.getElementById('pushBtn');
    pushBtn.disabled = true;
    pushBtn.innerHTML = '<span class="spinner"></span>Pushing...';

    const logSection = document.getElementById('logSection');
    const logList = document.getElementById('logList');
    logSection.classList.remove('hidden');
    logList.innerHTML = '';

    const today = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    const dbUrl = document.getElementById('dbUrl').value.trim();

    for (let i = 0; i < parsedGarments.length; i++) {
      const g = parsedGarments[i];
      const badge = document.getElementById(`badge-${i}`);
      badge.className = 'badge badge-pushing';
      badge.textContent = 'Pushing...';

      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            mcp_servers: [{ type: "url", url: "https://mcp.notion.com/mcp", name: "notion-mcp" }],
            messages: [{
              role: "user",
              content: `You are helping distribute fit session notes into a Notion database. The database is located at this URL: ${dbUrl}. Search that database for a page where the Style Code property equals "${g.styleCode}". Once found, append the following to the BODY of that page. Add a heading 2 block: "Fit Session — ${today}", then add a paragraph block with the notes below. Do not overwrite existing content — only append below existing content.

Notes:
${g.notes}

Reply with "Done" when complete or describe any error.`
            }]
          })
        });

        const data = await res.json();
        const reply = data.content.filter(b => b.type === 'text').map(b => b.text).join('').toLowerCase();
        const ok = reply.includes('done') || reply.includes('appended') || reply.includes('added') || reply.includes('updated') || reply.includes('appended');

        badge.className = `badge ${ok ? 'badge-done' : 'badge-error'}`;
        badge.textContent = ok ? 'Done' : 'Check';
        logList.innerHTML += `<div class="log-row ${ok ? 'log-ok' : 'log-err'}">${ok ? '✓' : '✗'}  ${g.styleCode} — ${ok ? 'Notes appended successfully' : 'Could not confirm — please check Notion manually'}</div>`;

      } catch(e) {
        const badge2 = document.getElementById(`badge-${i}`);
        badge2.className = 'badge badge-error';
        badge2.textContent = 'Error';
        logList.innerHTML += `<div class="log-row log-err">✗  ${g.styleCode} — ${e.message}</div>`;
      }

      await new Promise(r => setTimeout(r, 900));
    }

    pushBtn.disabled = false;
    pushBtn.textContent = 'Push all to Notion';
  }

  function reset() {
    parsedGarments = [];
    notionPageContent = '';
    document.getElementById('pageUrl').value = '';
    document.getElementById('dbUrl').value = '';
    document.getElementById('previewSection').classList.add('hidden');
    document.getElementById('logSection').classList.add('hidden');
    document.getElementById('parseStatus').classList.add('hidden');
    document.getElementById('garmentList').innerHTML = '';
    document.getElementById('logList').innerHTML = '';
  }
</script>
</body>
</html>
